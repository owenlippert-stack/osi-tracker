# Free weekday V-DEM breach alert via GitHub Actions.
# Place at .github/workflows/vdem-alert.yml in your repo.
# Set repo secret SLACK_WEBHOOK_URL and repo variable OSI_SITE_BASE.
name: V-DEM Weekday Alert

on:
  schedule:
    # GitHub cron is UTC-only. 09:00 America/Toronto is 13:00 UTC (EDT) or
    # 14:00 UTC (EST). We fire at BOTH; the script's local-hour guard makes
    # the wrong one a no-op, so it's always 09:00 Toronto year-round.
    - cron: '0 13 * * 1-5'
    - cron: '0 14 * * 1-5'
  workflow_dispatch: {}   # allow manual runs (guard is bypassed on manual runs)

permissions:
  contents: write          # so the workflow can commit the updated snapshot

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run breach alert
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          OSI_SITE_BASE: ${{ vars.OSI_SITE_BASE }}
          VDEM_DATA_CSV: ./vdem_current.csv
          VDEM_SNAPSHOT: ./vdem_snapshot.json
        run: python3 vdem_alert.py

      - name: Persist snapshot for next run
        run: |
          if [[ -n "$(git status --porcelain vdem_snapshot.json)" ]]; then
            git config user.name  "vdem-alert-bot"
            git config user.email "actions@users.noreply.github.com"
            git add vdem_snapshot.json
            git commit -m "chore: update V-DEM snapshot [skip ci]"
            git push
          fi
